<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INTEL DB - SANN404</title>
    <style>
        :root {
            --hitam-muda: #1c1c1c;
            --putih-tua: #e3e3e3;
            --border-color: #444;
        }
        body {
            background-color: var(--hitam-muda);
            color: var(--putih-tua);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .terminal {
            width: 100%;
            max-width: 600px;
            background-color: #111;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
            margin-top: 10px;
        }
        h1 {
            text-align: center;
            font-size: 1.3rem;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 15px;
            margin-top: 0;
            letter-spacing: 1.5px;
        }
        label {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
            color: #aaa;
        }
        select, input, button {
            width: 100%;
            padding: 12px;
            background-color: var(--hitam-muda);
            color: var(--putih-tua);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 15px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--putih-tua);
        }
        button {
            background-color: var(--putih-tua);
            color: var(--hitam-muda);
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 5px;
        }
        button:active {
            transform: scale(0.98);
        }
        .output-screen {
            background-color: #000;
            border: 1px solid var(--border-color);
            padding: 15px;
            min-height: 200px;
            margin-top: 20px;
            font-size: 0.85rem;
            line-height: 1.5;
            overflow-x: auto;
            border-radius: 4px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 0.8rem;
            color: #777;
            border-top: 1px dashed var(--border-color);
            padding-top: 10px;
        }
        .dev-credit {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: #666;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="terminal">
        <h1>[ SYSTEM OVERRIDE ]</h1>
        
        <label for="node">TARGET NODE:</label>
        <select id="node">
            <option value="NODE_01">DB_CONTACT_01 [GET]</option>
            <option value="NODE_02">DB_CALLER_02 [GET]</option>
            <option value="NODE_03">DB_LEAK_03 [GET]</option>
            <option value="NODE_04">DB_WA_04 [GET]</option>
            <option value="NODE_05">DB_EWALLET_05 [GET]</option>
            <option value="NODE_06">DB_GURU_06 [GET]</option>
            <option value="NODE_07">DB_EMAIL_07 [GET]</option>
            <option value="NODE_08">DB_NAME_08 [GET]</option>
            <option value="NODE_09">DB_SISWA_09 [GET]</option>
            <option value="NODE_10">DB_NIK_10 [GET]</option>
            <option value="NODE_11">DB_DCPHONE_11 [GET]</option>
            <option value="NODE_12">DB_BPJSP_12 [GET]</option>
            <option value="NODE_13">DB_BPJSK_13 [GET]</option>
            <option value="NODE_14">DB_DUKNAME_14 [GET]</option>
            <option value="NODE_15">DB_DUKNIK_15 [GET]</option>
            <option value="NODE_16">DB_DUKKK_16 [GET]</option>
            <option value="NODE_17">DB_SCHOOL_17 [POST]</option>
        </select>

        <label for="query">QUERY PARAMETER:</label>
        <input type="text" id="query" placeholder="Input target data..." autocomplete="off">

        <button onclick="executeSearch()" id="btn-search">Execute Command</button>

        <div class="output-screen" id="output">
> SYSTEM READY.
> ENCRYPTION: ACTIVE.
> Awaiting input...
        </div>

        <div class="status-bar">
            <span id="limit-status">LIMIT: UNKNOWN</span>
            <span>SECURE CONNECTION</span>
        </div>

        <div class="dev-credit">
            SYSTEM BY: <strong>SANN404 FORUM</strong>
        </div>
    </div>

    <script>
        function formatData(data) {
            // Jika data berupa Teks/HTML (seperti di screenshot)
            if (typeof data === 'string') {
                return data.replace(/\\n/g, '<br>').replace(/\n/g, '<br>');
            }
            // Jika data berupa JSON Object
            if (data && typeof data === 'object') {
                return `<pre style="margin:0; white-space:pre-wrap;">${JSON.stringify(data, null, 2)}</pre>`;
            }
            return data;
        }

        async function executeSearch() {
            const nodeId = document.getElementById('node').value;
            const query = document.getElementById('query').value.trim();
            const outputBox = document.getElementById('output');
            const limitStatus = document.getElementById('limit-status');
            const btn = document.getElementById('btn-search');

            if(!query) {
                outputBox.innerHTML = "> [ERROR] Query parameter is required.";
                return;
            }

            btn.disabled = true;
            btn.innerText = "EXECUTING...";
            outputBox.innerHTML = `> Establishing secure tunnel...\n> Target Node: ${nodeId}\n> Extracting data...`.replace(/\n/g, '<br>');

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nodeId, query })
                });

                const result = await response.json();
                let outputHtml = '';

                if (result.status === 'success') {
                    outputHtml = `> <span style="color:#4caf50;">[SUCCESS] DATA EXTRACTED.</span><br><br>${formatData(result.data)}`;
                } else if (result.status === 'not_found') {
                    outputHtml = `> <span style="color:#ff9800;">[NOT FOUND]</span> ${result.message}<br><br>${result.data ? formatData(result.data) : ''}`;
                } else if (result.status === 'error') {
                    outputHtml = `> <span style="color:#f44336;">[FAILED]</span> ${result.message}`;
                } else if (result.status === 'limit_reached') {
                    outputHtml = `> <span style="color:#f44336;">[LOCKED]</span> ${result.message}`;
                }

                outputBox.innerHTML = outputHtml;

                if(result.limit_remaining !== undefined) {
                    limitStatus.innerText = `LIMIT REMAINING: ${result.limit_remaining}/4`;
                }

            } catch (error) {
                outputBox.innerHTML = "> <span style=\"color:#f44336;\">[FATAL ERROR]</span> Server connection timeout.";
            } finally {
                btn.disabled = false;
                btn.innerText = "EXECUTE COMMAND";
            }
        }
    </script>
</body>
</html>
